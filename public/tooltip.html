<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --pg-canvas-subtle: #EBE7E1;
  --pg-fg-default: #241E17;
  --pg-fg-muted: #5D574F;
  --pg-fg-subtle: #868078;
  --pg-border-muted: #E4DFD8;
  --pg-accent-fg: #0969DA;
  --pg-neutral-3: #EBE7E1;
  --pg-shadow-color: 36, 30, 23;
}

html.dark {
  --pg-canvas-subtle: #2e333c;
  --pg-fg-default: #c9ced7;
  --pg-fg-muted: #8a919c;
  --pg-fg-subtle: #636d7b;
  --pg-border-muted: #4b5260;
  --pg-accent-fg: #478be6;
  --pg-neutral-3: #282c34;
  --pg-shadow-color: 40, 44, 52;
}

html, body {
  background: transparent !important;
  overflow: hidden;
  pointer-events: none;
  width: max-content;
  height: max-content;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
  font-size: 13px;
  line-height: 1.6;
  letter-spacing: -0.01em;
}

#tooltip {
  display: none;
  max-width: 360px;
  min-width: 80px;
  background: var(--pg-canvas-subtle);
  color: var(--pg-fg-default);
  border: 1px solid var(--pg-border-muted);
  border-radius: 6px;
  box-shadow: 0 8px 24px rgba(var(--pg-shadow-color), 0.12);
  padding: 8px 12px;
}

#tooltip .tooltip-content {
  white-space: pre-wrap;
  word-break: break-word;
  overflow-wrap: break-word;
}

#tooltip .tooltip-image-preview {
  display: flex;
  align-items: center;
  justify-content: center;
  max-width: 320px;
  max-height: 240px;
  margin-bottom: 8px;
}

#tooltip .tooltip-image-preview img {
  display: block;
  max-width: 320px;
  max-height: 240px;
  width: auto;
  height: auto;
  border-radius: 6px;
  object-fit: contain;
}

#tooltip .tooltip-meta {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 6px;
  margin-top: 6px;
  padding-top: 6px;
  border-top: 1px solid var(--pg-border-muted);
  font-size: 11px;
  line-height: 1.4;
  color: var(--pg-fg-muted);
}

#tooltip .tooltip-meta .meta-badge {
  display: inline-flex;
  align-items: center;
  border-radius: 2px;
  background: var(--pg-neutral-3);
  padding: 1px 5px;
  font-weight: 500;
  color: var(--pg-fg-muted);
}

#tooltip .tooltip-meta .meta-source {
  color: var(--pg-fg-subtle);
  font-weight: 500;
}

#tooltip .tooltip-meta .meta-time {
  margin-left: auto;
  color: var(--pg-fg-subtle);
  font-variant-numeric: tabular-nums;
}

@media (prefers-reduced-motion: reduce) {
  #tooltip { animation: none !important; }
}
</style>
</head>
<body>
<div id="tooltip" role="tooltip"></div>
<script>
const tooltipState = {
  requestId: 0,
  image: null,
  imageLoadHandler: null,
  imageErrorHandler: null,
  timeoutId: null,
};

function cleanupPendingImage() {
  if (tooltipState.image && tooltipState.imageLoadHandler) {
    tooltipState.image.removeEventListener('load', tooltipState.imageLoadHandler);
  }
  if (tooltipState.image && tooltipState.imageErrorHandler) {
    tooltipState.image.removeEventListener('error', tooltipState.imageErrorHandler);
  }
  if (tooltipState.timeoutId) {
    clearTimeout(tooltipState.timeoutId);
  }

  tooltipState.image = null;
  tooltipState.imageLoadHandler = null;
  tooltipState.imageErrorHandler = null;
  tooltipState.timeoutId = null;
}

function invokeTooltipReady(requestId, el) {
  if (!window.__TAURI_INTERNALS__) {
    return;
  }

  window.__TAURI_INTERNALS__.invoke('tooltip_ready', {
    requestId,
    width: el.offsetWidth,
    height: el.offsetHeight,
  }).catch(function() {});
}

function measureTooltip(requestId, el) {
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      if (tooltipState.requestId !== requestId) {
        return;
      }
      invokeTooltipReady(requestId, el);
    });
  });
}

function fallbackToText(el, image) {
  const preview = el.querySelector('.tooltip-image-preview');
  if (preview) {
    preview.remove();
  }

  const fallbackContent = image.dataset.fallbackContent || '';
  if (!fallbackContent) {
    return;
  }

  const existingContent = el.querySelector('.tooltip-content');
  if (existingContent) {
    existingContent.textContent = fallbackContent;
    return;
  }

  const content = document.createElement('div');
  content.className = 'tooltip-content';
  content.textContent = fallbackContent;
  const meta = el.querySelector('.tooltip-meta');
  el.insertBefore(content, meta || null);
}

window.showTooltip = function showTooltip(requestId, html, theme) {
  document.documentElement.classList.toggle('dark', theme === 'dark');
  const el = document.getElementById('tooltip');

  cleanupPendingImage();
  tooltipState.requestId = requestId;
  el.innerHTML = html;
  el.style.display = 'block';

  const image = el.querySelector('img[data-request-id]');
  if (!image) {
    measureTooltip(requestId, el);
    return;
  }

  tooltipState.image = image;
  tooltipState.imageLoadHandler = function() {
    if (tooltipState.requestId !== requestId) {
      return;
    }
    cleanupPendingImage();
    measureTooltip(requestId, el);
  };
  tooltipState.imageErrorHandler = function() {
    if (tooltipState.requestId !== requestId) {
      return;
    }
    cleanupPendingImage();
    fallbackToText(el, image);
    measureTooltip(requestId, el);
  };
  tooltipState.timeoutId = setTimeout(function() {
    if (tooltipState.requestId !== requestId) {
      return;
    }
    cleanupPendingImage();
    fallbackToText(el, image);
    measureTooltip(requestId, el);
  }, 2000);

  image.addEventListener('load', tooltipState.imageLoadHandler);
  image.addEventListener('error', tooltipState.imageErrorHandler);
  if (image.complete) {
    if (image.naturalWidth > 0) {
      tooltipState.imageLoadHandler();
    }
    else {
      tooltipState.imageErrorHandler();
    }
  }
};

window.hideTooltip = function hideTooltip() {
  const el = document.getElementById('tooltip');
  tooltipState.requestId = 0;
  cleanupPendingImage();
  el.style.display = 'none';
  el.innerHTML = '';
};
</script>
</body>
</html>
