<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --pg-canvas-subtle: #EBE7E1;
  --pg-fg-default: #241E17;
  --pg-fg-muted: #5D574F;
  --pg-fg-subtle: #868078;
  --pg-border-muted: #E4DFD8;
  --pg-accent-fg: #0969DA;
  --pg-neutral-3: #EBE7E1;
  --pg-shadow-color: 36, 30, 23;
}

html.dark {
  --pg-canvas-subtle: #2e333c;
  --pg-fg-default: #c9ced7;
  --pg-fg-muted: #8a919c;
  --pg-fg-subtle: #636d7b;
  --pg-border-muted: #4b5260;
  --pg-accent-fg: #478be6;
  --pg-neutral-3: #282c34;
  --pg-shadow-color: 40, 44, 52;
}

html, body {
  background: transparent !important;
  overflow: hidden;
  pointer-events: none;
  width: max-content;
  height: max-content;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
  font-size: 13px;
  line-height: 1.6;
  letter-spacing: -0.01em;
}

#tooltip {
  display: none;
  max-width: 360px;
  min-width: 80px;
  background: var(--pg-canvas-subtle);
  color: var(--pg-fg-default);
  border: 1px solid var(--pg-border-muted);
  border-radius: 6px;
  box-shadow: 0 8px 24px rgba(var(--pg-shadow-color), 0.12);
  padding: 8px 12px;
}

#tooltip .tooltip-content {
  white-space: pre-wrap;
  word-break: break-word;
  overflow-wrap: break-word;
}

#tooltip .tooltip-meta {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 6px;
  margin-top: 6px;
  padding-top: 6px;
  border-top: 1px solid var(--pg-border-muted);
  font-size: 11px;
  line-height: 1.4;
  color: var(--pg-fg-muted);
}

#tooltip .tooltip-meta .meta-badge {
  display: inline-flex;
  align-items: center;
  border-radius: 2px;
  background: var(--pg-neutral-3);
  padding: 1px 5px;
  font-weight: 500;
  color: var(--pg-fg-muted);
}

#tooltip .tooltip-meta .meta-source {
  color: var(--pg-fg-subtle);
  font-weight: 500;
}

#tooltip .tooltip-meta .meta-time {
  margin-left: auto;
  color: var(--pg-fg-subtle);
  font-variant-numeric: tabular-nums;
}

@media (prefers-reduced-motion: reduce) {
  #tooltip { animation: none !important; }
}
</style>
</head>
<body>
<div id="tooltip" role="tooltip"></div>
<script>
window.showTooltip = function showTooltip(html, theme) {
  document.documentElement.classList.toggle('dark', theme === 'dark');
  const el = document.getElementById('tooltip');
  el.innerHTML = html;
  el.style.display = 'block';
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      var w = el.offsetWidth;
      var h = el.offsetHeight;
      if (window.__TAURI_INTERNALS__) {
        window.__TAURI_INTERNALS__.invoke('tooltip_ready', { width: w, height: h });
      }
    });
  });
};

window.hideTooltip = function hideTooltip() {
  const el = document.getElementById('tooltip');
  el.style.display = 'none';
  el.innerHTML = '';
};
</script>
</body>
</html>
